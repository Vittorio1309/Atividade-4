<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .botoes {
            margin-top: 20px;
        }

        .btn-salvar {
            padding: 10px 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-voltar {
            padding: 10px 14px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${aluno.id == null ? 'Cadastrar Aluno' : 'Editar Aluno'}"></h1>

    <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">
        <input type="hidden" th:field="*{id}">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required>

        <label for="matricula">Matrícula:</label>
        <input type="text" id="matricula" th:field="*{matricula}" required>

        <label for="curso">Curso:</label>
        <input type="text" id="curso" th:field="*{curso}" required>

        <div class="botoes">
            <button type="submit" class="btn-salvar">Salvar</button>
            <a th:href="@{/alunos}" class="btn-voltar">Voltar</a>
        </div>
    </form>
</div>
</body>
</html>
